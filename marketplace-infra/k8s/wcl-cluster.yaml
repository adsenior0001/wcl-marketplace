# ==========================================
# 1. PRODUCT SERVICE (Internal)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: wclmarketplacexyz.azurecr.io/product-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: MONGO_HOST
              value: "mongo-db"
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongo-db:27017/product_db"
            - name: KAFKA_HOST
              value: "kafka"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082


# ==========================================
# 2. ORDER SERVICE (Internal)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: wclmarketplacexyz.azurecr.io/order-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-orders:5432/orders_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "wcl_admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "wcl_password"
            - name: KAFKA_HOST
              value: "kafka"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083


# ==========================================
# 3. USER SERVICE (Internal)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: wclmarketplacexyz.azurecr.io/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: "postgres-db"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-db:5432/wcl_users"
            - name: SPRING_DATASOURCE_USERNAME
              value: "myuser"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "mypassword"
            - name: KAFKA_HOST
              value: "kafka"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081


# ==========================================
# 4. API GATEWAY (Public + Bulletproof CORS)
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: wclmarketplacexyz.azurecr.io/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_HOST
              value: "user-service"
            - name: PRODUCT_SERVICE_HOST
              value: "product-service"
            - name: ORDER_SERVICE_HOST
              value: "order-service"
            # --- THE BULLETPROOF CORS FIX ---
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"gateway":{"globalcors":{"corsConfigurations":{"[/**]":{"allowedOrigins":["*"],"allowedMethods":["GET","POST","PUT","DELETE","OPTIONS"],"allowedHeaders":["*"]}}}}}}}'
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080


