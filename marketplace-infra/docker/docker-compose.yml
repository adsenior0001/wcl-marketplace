services:
  # --- 1. RELATIONAL DATABASE (USERS) ---
  postgres-db:
    image: postgres:15-alpine
    container_name: wcl-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: wcl_users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- 1B. RELATIONAL DATABASE (ORDERS) ---
  postgres-orders:
    image: postgres:15-alpine
    container_name: wcl-postgres-orders
    environment:
      POSTGRES_USER: wcl_admin
      POSTGRES_PASSWORD: wcl_password
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432" # Mapped to 5433 locally so it doesn't clash with the user DB
    volumes:
      - postgres-orders-data:/var/lib/postgresql/data

  # --- 2. NOSQL DATABASE (PRODUCTS) ---
  mongo-db:
    image: mongo:7.0
    container_name: wcl-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- 3. ZOOKEEPER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: wcl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # --- 4. KAFKA BROKER ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: wcl-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- 5. USER SERVICE ---
  user-service:
    build:
      context: ../../marketplace-backend
      dockerfile: Dockerfile.user
    container_name: wcl-user-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres-db
      - KAFKA_HOST=kafka
    depends_on:
      - postgres-db
      - kafka

  # --- 6. PRODUCT SERVICE ---
  product-service:
    build:
      context: ../../marketplace-backend
      dockerfile: Dockerfile.product
    container_name: wcl-product-service
    ports:
      - "8082:8082"
    environment:
      - MONGO_HOST=mongo-db
      - KAFKA_HOST=kafka
    depends_on:
      - mongo-db
      - kafka

  # --- 7. ORDER SERVICE ---
  order-service:
    build:
      context: ../../marketplace-backend
      dockerfile: Dockerfile.order
    container_name: wcl-order-service
    ports:
      - "8083:8083"
    environment:
      - KAFKA_HOST=kafka
    depends_on:
      - postgres-orders
      - kafka

  # --- 8. API GATEWAY ---
  api-gateway:
    build:
      context: ../../marketplace-backend
      dockerfile: Dockerfile.gateway
    container_name: wcl-api-gateway
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_HOST=user-service
      - PRODUCT_SERVICE_HOST=product-service
      - ORDER_SERVICE_HOST=order-service # <-- Gateway now knows about the order service
    depends_on:
      - user-service
      - product-service
      - order-service

  # --- 9. FRONTEND (ANGULAR + NGINX) ---
  frontend:
    build:
      context: ../../marketplace-frontend
      dockerfile: Dockerfile
    container_name: wcl-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
  postgres-orders-data: # <-- Persists your order history