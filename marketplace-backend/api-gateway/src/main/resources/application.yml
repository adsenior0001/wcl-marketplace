server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route 1: User Service
        - id: user-service-route
          uri: http://${USER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/users/**

        # Route 2: Product Service
        - id: product-service-route
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/products/**
          filters:
            - Authentication # <-- The Bouncer is now stationed here

        # Route 3: Order Service
        - id: order-service-route
          uri: http://${ORDER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - Authentication # <-- Orders must also be secure!

      # Optional but highly recommended: Add default CORS headers for Angular
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost"     # <--- Add your new NGINX origin
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"