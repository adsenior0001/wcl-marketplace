name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main

env:
  # CRITICAL: Replace 'acrwclmarketplacexyz' with the exact name of your Azure Container Registry
  ACR_NAME: wclmarketplacexyz

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log into Azure using the secret JSON we stored
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Log into your specific Container Registry
      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      # 4. Build and Push Product Service
      - name: Build and Push Product Service
        run: |
          docker build -f marketplace-backend/Dockerfile.product -t ${{ env.ACR_NAME }}.azurecr.io/product-service:latest marketplace-backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/product-service:latest

      # 5. Build and Push Order Service
      - name: Build and Push Order Service
        run: |
          docker build -f marketplace-backend/Dockerfile.order -t ${{ env.ACR_NAME }}.azurecr.io/order-service:latest marketplace-backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/order-service:latest

      # 6. Build and Push User Service
      - name: Build and Push User Service
        run: |
          docker build -f marketplace-backend/Dockerfile.user -t ${{ env.ACR_NAME }}.azurecr.io/user-service:latest marketplace-backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/user-service:latest

      # 7. Build and Push API Gateway
      - name: Build and Push API Gateway
        run: |
          docker build -f marketplace-backend/Dockerfile.gateway -t ${{ env.ACR_NAME }}.azurecr.io/api-gateway:latest marketplace-backend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/api-gateway:latest

      # 8. Build and Push Frontend Angular SPA
      - name: Build and Push Frontend
        run: |
          docker build -f marketplace-frontend/Dockerfile -t ${{ env.ACR_NAME }}.azurecr.io/frontend:latest marketplace-frontend/
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:latest
